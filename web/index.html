<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MR7 Chat - Chat and AI Platform">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060006">
  <title>MR7 Chat</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #060006; overflow: hidden; }
    #splash {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 25%, rgba(139,0,0,0.32) 0%, transparent 55%),
                  linear-gradient(155deg, #0D0005 0%, #060006 50%, #0A0005 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease;
    }
    #splash img {
      width: 160px; height: 160px; object-fit: contain; border-radius: 50%;
      box-shadow: 0 0 40px rgba(255,0,50,0.5), 0 0 80px rgba(255,0,50,0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    .tagline {
      font-size: 10px; letter-spacing: 4px; margin-top: 14px;
      color: rgba(255,255,255,0.25); font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
    .dots { display: flex; gap: 6px; margin-top: 32px; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #FF1744; animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,0,50,0.7), 0 0 100px rgba(255,0,50,0.3); }
    }
    @keyframes bounce {
      0%, 100% { opacity: 0.25; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-512.png" alt="MR7 Chat" onerror="this.style.display='none'">
    <div class="tagline">Chat &nbsp;&#183;&nbsp; AI &nbsp;&#183;&nbsp; Connect</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    window.addEventListener("flutter-first-frame", function() {
      var s = document.getElementById("splash");
      if (s) { s.style.opacity = "0"; setTimeout(function() { s.remove(); }, 600); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
