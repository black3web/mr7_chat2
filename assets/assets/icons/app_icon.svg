<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep dark with red undertone -->
    <radialGradient id="bgCenter" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1A0008" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060006" stop-opacity="1"/>
    </radialGradient>
    
    <!-- M: white neon glow -->
    <filter id="mGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- R: red neon glow -->
    <filter id="rGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 7: accent glow -->
    <filter id="sevenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Outer ring glow -->
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- M white gradient: bright center, soft edges -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E8E8FF"/>
      <stop offset="100%" stop-color="#AAAACC"/>
    </linearGradient>
    
    <!-- R red neon gradient -->
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4466"/>
      <stop offset="40%" stop-color="#FF0033"/>
      <stop offset="100%" stop-color="#AA0022"/>
    </linearGradient>
    
    <!-- 7 accent -->
    <linearGradient id="sevenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6688"/>
      <stop offset="100%" stop-color="#CC0033"/>
    </linearGradient>
    
    <!-- Subtle circuit pattern background -->
    <pattern id="circuit" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none"/>
      <path d="M0,40 L20,40 L20,20 L60,20 L60,40 L80,40" 
            stroke="#8B0000" stroke-width="0.5" fill="none" opacity="0.25"/>
      <path d="M40,0 L40,20 M40,60 L40,80" 
            stroke="#8B0000" stroke-width="0.5" fill="none" opacity="0.2"/>
      <circle cx="20" cy="40" r="2" fill="#8B0000" opacity="0.3"/>
      <circle cx="60" cy="20" r="2" fill="#8B0000" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background shape: rounded square -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgCenter)"/>
  
  <!-- Circuit pattern overlay -->
  <rect width="1024" height="1024" rx="180" fill="url(#circuit)"/>
  
  <!-- Outer decorative ring (dragon circle motif) -->
  <circle cx="512" cy="512" r="470" fill="none" 
          stroke="#8B0000" stroke-width="2.5" opacity="0.5"
          filter="url(#ringGlow)"/>
  <circle cx="512" cy="512" r="460" fill="none" 
          stroke="#FF0033" stroke-width="0.8" opacity="0.3"/>

  <!-- Dragon wing decorations (abstract, top-left for M, top-right for R) -->
  <!-- Left wing hint (white, behind M) -->
  <path d="M 80 380 Q 120 200 200 240 Q 150 300 170 380" 
        fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.15"
        filter="url(#mGlow)"/>
  <path d="M 90 420 Q 100 280 180 300" 
        fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.1"/>
  
  <!-- Right wing hint (red, behind R7) -->
  <path d="M 944 380 Q 904 200 824 240 Q 874 300 854 380" 
        fill="none" stroke="#FF0033" stroke-width="2" opacity="0.15"
        filter="url(#rGlow)"/>
  <path d="M 934 420 Q 924 280 844 300" 
        fill="none" stroke="#FF0033" stroke-width="1.5" opacity="0.1"/>

  <!-- Horizontal accent line beneath letters -->
  <line x1="80" y1="755" x2="500" y2="755" 
        stroke="#AAAACC" stroke-width="2" opacity="0.4"
        filter="url(#mGlow)"/>
  <line x1="520" y1="755" x2="944" y2="755" 
        stroke="#FF0033" stroke-width="2" opacity="0.4"
        filter="url(#rGlow)"/>

  <!-- ═══════════════════════════════════════════
       LETTER M — White Neon Dragon style
       Custom serif with slight forward lean
       ═══════════════════════════════════════════ -->
  <!-- Shadow/depth layer -->
  <text x="68" y="712"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="#000000" opacity="0.6">M</text>

  <!-- Main M with white neon -->
  <text x="64" y="708"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="url(#mGrad)"
        filter="url(#mGlow)"
        opacity="0.95">M</text>
  
  <!-- M stroke outline for crispness -->
  <text x="64" y="708"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="none" stroke="#FFFFFF" stroke-width="1"
        opacity="0.5">M</text>

  <!-- ═══════════════════════════════════════════
       LETTER R — Red Neon Dragon style
       ═══════════════════════════════════════════ -->
  <!-- Shadow layer -->
  <text x="448" y="712"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="#330000" opacity="0.7">R</text>

  <!-- Main R red neon -->
  <text x="444" y="708"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="url(#rGrad)"
        filter="url(#rGlow)">R</text>

  <!-- R stroke for neon tube effect -->
  <text x="444" y="708"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="none" stroke="#FF6688" stroke-width="1.5"
        opacity="0.5">R</text>

  <!-- ═══════════════════════════════════════════
       SUPERSCRIPT 7 — Small accent top right
       ═══════════════════════════════════════════ -->
  <text x="838" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="200" font-weight="900" font-style="italic"
        fill="url(#sevenGrad)"
        filter="url(#sevenGlow)">7</text>
  
  <!-- 7 stroke outline -->
  <text x="838" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="200" font-weight="900" font-style="italic"
        fill="none" stroke="#FF4466" stroke-width="1"
        opacity="0.6">7</text>

  <!-- Bottom reflection (floor effect like the reference image) -->
  <defs>
    <linearGradient id="reflGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflGradR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF0033" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF0033" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- White reflection below M -->
  <text x="64" y="760"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="url(#reflGrad)"
        transform="scale(1,-1) translate(0,-1520)">M</text>

  <!-- Red reflection below R -->
  <text x="444" y="760"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="580" font-weight="900" font-style="italic"
        fill="url(#reflGradR)"
        transform="scale(1,-1) translate(0,-1520)">R</text>

  <!-- Inner border -->
  <rect x="8" y="8" width="1008" height="1008" rx="175"
        fill="none" stroke="#FF0033" stroke-width="1.5" opacity="0.2"/>
</svg>